services:
  a2a-zhihu:
    build:
      context: .
      dockerfile: Dockerfile
    image: a2a-zhihu:aliyun
    container_name: a2a-zhihu
    restart: unless-stopped
    ports:
      - "${A2A_PUBLIC_PORT:-18080}:80"
    env_file:
      - ./backend/.env.aliyun
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1/api/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
